[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Enable IR-based code generation + optimizer to avoid "stack too deep"
# errors in the liquidity deploy scripts (Uniswap V2 router calls have
# many local vars). Slightly slower compile, but stable.
via_ir = true
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
